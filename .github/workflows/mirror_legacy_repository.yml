name: Mirror legacy repository

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  delete:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mirror-legacy-repository
  cancel-in-progress: false

jobs:
  mirror:
    if: github.repository == 'pu-orfe/upcoming'
    runs-on: ubuntu-latest
    env:
      LEGACY_REPOSITORY: princeton-orfe/orfe-upcoming
    steps:
      - name: Clone source repository as a bare mirror
        env:
          SOURCE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone --mirror "https://x-access-token:${SOURCE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo.git

      - name: Push branches and tags to the legacy repository
        env:
          TARGET_TOKEN: ${{ secrets.LEGACY_REPOSITORY_TOKEN }}
        run: |
          set -euo pipefail
          cd repo.git
          git remote add legacy "https://x-access-token:${TARGET_TOKEN}@github.com/${LEGACY_REPOSITORY}.git"
          git push --prune legacy 'refs/heads/*:refs/heads/*'
          git push --prune legacy 'refs/tags/*:refs/tags/*'
